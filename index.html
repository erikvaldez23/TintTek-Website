<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />

    <!-- Analytics: GA4 + Meta Pixel are injected client-side by
         src/utils/analytics.js (see initAnalytics) rather than hardcoded
         here, so the scripts can be toggled per-environment via
         VITE_GA_MEASUREMENT_ID / VITE_META_PIXEL_ID without a deploy. -->

    <!-- SSR: per-route head tags (title, meta, canonical, JSON-LD) injected here -->
    <!--app-head-->

    <!-- Site-wide meta (SSR head injection above provides per-route overrides) -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Tint Tek Plus" />
    <meta name="geo.region" content="US-TX" />
    <meta name="geo.placename" content="Garland, Texas" />
    <meta name="geo.position" content="32.9126;-96.6389" />
    <meta name="ICBM" content="32.9126, -96.6389" />

    <!-- Open Graph site-wide -->
    <meta property="og:site_name" content="Tint Tek Plus" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card type (per-route values injected by SSR) -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Performance: preconnects + non-blocking font load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload hero poster — only the image; video uses preload="metadata" on the element itself -->
    <link rel="preload" as="image" href="/v-window-tint/vehicle-window-tint.webp" />

    <!-- WebSite schema with SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Tint Tek Plus",
        "url": "https://tinttekplus.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://tinttekplus.com/support?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- LocalBusiness schema (comprehensive) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["LocalBusiness", "AutoRepair"],
        "name": "Tint Tek Plus",
        "image": [
          "https://tinttekplus.com/logo.webp",
          "https://tinttekplus.com/favicon.jpg",
          "https://tinttekplus.com/v-window-tint/vehicle-window-tint.webp"
        ],
        "url": "https://tinttekplus.com",
        "telephone": "+1-972-362-8468",
        "email": "info@tinttekplus.com",
        "priceRange": "$$",
        "currenciesAccepted": "USD",
        "paymentAccepted": "Cash, Credit Card, Debit Card",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "2518 West Kingsley Rd",
          "addressLocality": "Garland",
          "addressRegion": "TX",
          "postalCode": "75040",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 32.9126,
          "longitude": -96.6389
        },
        "areaServed": [
          { "@type": "City", "name": "Garland", "sameAs": "https://en.wikipedia.org/wiki/Garland,_Texas" },
          { "@type": "City", "name": "Dallas", "sameAs": "https://en.wikipedia.org/wiki/Dallas" },
          { "@type": "City", "name": "Plano", "sameAs": "https://en.wikipedia.org/wiki/Plano,_Texas" },
          { "@type": "City", "name": "Frisco", "sameAs": "https://en.wikipedia.org/wiki/Frisco,_Texas" },
          { "@type": "City", "name": "Richardson", "sameAs": "https://en.wikipedia.org/wiki/Richardson,_Texas" },
          { "@type": "City", "name": "Mesquite", "sameAs": "https://en.wikipedia.org/wiki/Mesquite,_Texas" },
          { "@type": "City", "name": "Rowlett", "sameAs": "https://en.wikipedia.org/wiki/Rowlett,_Texas" },
          { "@type": "City", "name": "Sachse", "sameAs": "https://en.wikipedia.org/wiki/Sachse,_Texas" },
          { "@type": "City", "name": "Wylie", "sameAs": "https://en.wikipedia.org/wiki/Wylie,_Texas" },
          { "@type": "City", "name": "Murphy", "sameAs": "https://en.wikipedia.org/wiki/Murphy,_Texas" },
          { "@type": "City", "name": "Allen", "sameAs": "https://en.wikipedia.org/wiki/Allen,_Texas" },
          { "@type": "City", "name": "McKinney", "sameAs": "https://en.wikipedia.org/wiki/McKinney,_Texas" },
          { "@type": "City", "name": "Carrollton", "sameAs": "https://en.wikipedia.org/wiki/Carrollton,_Texas" },
          { "@type": "City", "name": "Addison", "sameAs": "https://en.wikipedia.org/wiki/Addison,_Texas" }
        ],
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"
            ],
            "opens": "09:00",
            "closes": "18:00"
          }
        ],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Window Tinting & Protection Services",
          "itemListElement": [
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Vehicle Window Tinting" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Tesla Window Tinting" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Commercial Window Tinting" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Residential Window Tinting" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Paint Protection Film" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Ceramic Coating" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Paint Correction" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Headlight & Taillight Tinting" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Windshield Protection Film" } }
          ]
        },
        "sameAs": [
          "https://www.tinttekplus.com/",
          "https://www.facebook.com/tinttekplus",
          "https://www.instagram.com/tinttekplus"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"><!--app-html--></div>

    <script type="module" src="/src/entry-client.jsx"></script>
  </body>
</html>
